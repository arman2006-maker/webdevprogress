<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hover thorugh js</title>
</head>
<body>
    <button>click</button>
</body>
</html>
<script>
    document.querySelector("button").addEventListener("mouseenter",one);
    document.querySelector("button").addEventListener("mouseleave",two);
    
    function one()
{
    document.querySelector("button").style.color="red"}
    function two()
{    document.querySelector("button").style.color="blue"
}
</script>
